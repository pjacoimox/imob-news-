<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notícias do Mercado Imobiliário · Gerador de Posts</title>
<style>
  :root {
    /* ====== PERSONALIZE A MARCA AQUI (também em CONFIG no script) ====== */
    --brand: #0f3d2e;        /* cor principal */
    --accent: #c8a24a;       /* cor de destaque */
    --bg: #f5f4f0;
    --card: #ffffff;
    --text: #1c1c1c;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header.top {
    background: var(--brand); color: #fff; padding: 22px 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  header.top h1 { font-size: 20px; margin: 0; font-weight: 700; }
  header.top .sub { font-size: 13px; opacity: .8; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 22px 16px 60px; }
  .meta-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 13px; color: var(--muted); flex-wrap: wrap; gap: 8px; }
  .btn {
    border: none; cursor: pointer; border-radius: 8px; padding: 9px 14px;
    font-size: 14px; font-weight: 600; background: var(--brand); color: #fff;
  }
  .btn.secondary { background: #e7e6e1; color: #333; }
  .btn:hover { opacity: .92; }
  .card {
    background: var(--card); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; gap: 14px; align-items: flex-start;
    justify-content: space-between;
  }
  .card .info { flex: 1; min-width: 0; }
  .card h3 { margin: 0 0 6px; font-size: 16px; line-height: 1.35; }
  .card h3 a { color: var(--text); text-decoration: none; }
  .card h3 a:hover { text-decoration: underline; }
  .card .src { font-size: 12.5px; color: var(--muted); }
  .tag { display: inline-block; background: var(--accent); color: #2a2300; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-right: 6px; }
  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; max-width: 860px; width: 100%; max-height: 92vh; overflow: auto; padding: 18px; }
  .modal h2 { margin: 0 0 12px; font-size: 17px; }
  .preview-row { display: flex; gap: 18px; flex-wrap: wrap; }
  .preview-col { flex: 1; min-width: 280px; }
  canvas { width: 100%; max-width: 360px; height: auto; border-radius: 10px; border: 1px solid #eee; display: block; }
  label { font-size: 13px; font-weight: 600; display: block; margin: 12px 0 4px; }
  textarea, input[type=text] { width: 100%; font-size: 14px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
  textarea { resize: vertical; min-height: 70px; }
  .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
</style>
</head>
<body>
<header class="top">
  <div>
    <h1 id="agencyName">Imobiliária</h1>
    <div class="sub">Notícias do mercado imobiliário de São Paulo</div>
  </div>
  <div class="sub" id="handle">@suaimobiliaria</div>
</header>

<div class="wrap">
  <div class="meta-bar">
    <span id="updatedAt">Carregando…</span>
    <button class="btn secondary" onclick="loadNews()">↻ Atualizar</button>
  </div>
  <div id="list"></div>
</div>

<!-- Modal de geração de post -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Gerar post para o Instagram</h2>
    <div class="preview-row">
      <div class="preview-col">
        <canvas id="canvas" width="1080" height="1080"></canvas>
      </div>
      <div class="preview-col">
        <label>Manchete (edite à vontade)</label>
        <textarea id="headlineInput" oninput="render()"></textarea>
        <label>Selo / categoria</label>
        <input type="text" id="kickerInput" value="MERCADO IMOBILIÁRIO" oninput="render()" />
        <label>Rodapé (fonte ou chamada)</label>
        <input type="text" id="footerInput" oninput="render()" />
        <div class="actions">
          <button class="btn" onclick="downloadPng()">⬇ Baixar PNG (1080×1080)</button>
          <button class="btn secondary" onclick="closeModal()">Fechar</button>
        </div>
        <p class="hint">A imagem é gerada no seu navegador. Baixe e publique no Instagram da imobiliária.</p>
      </div>
    </div>
  </div>
</div>

<script>
/* =================== CONFIG: PERSONALIZE AQUI =================== */
const CONFIG = {
  agencyName: "Imobiliária",          // nome exibido no topo e no post
  handle: "@suaimobiliaria",          // @ do Instagram
  brand: "#0f3d2e",                   // cor principal (igual ao --brand do CSS)
  accent: "#c8a24a",                  // cor de destaque (igual ao --accent)
  logoUrl: "",                        // opcional: caminho/URL de um logo PNG (ex.: "logo.png")
};
/* =============================================================== */

document.getElementById("agencyName").textContent = CONFIG.agencyName;
document.getElementById("handle").textContent = CONFIG.handle;

let logoImg = null;
if (CONFIG.logoUrl) {
  logoImg = new Image();
  logoImg.crossOrigin = "anonymous";
  logoImg.onload = render;
  logoImg.src = CONFIG.logoUrl;
}

async function loadNews() {
  const list = document.getElementById("list");
  list.innerHTML = '<div class="empty">Carregando notícias…</div>';
  try {
    const res = await fetch("news.json?_=" + Date.now());
    const data = await res.json();
    const upd = data.updatedAt ? new Date(data.updatedAt) : null;
    document.getElementById("updatedAt").textContent =
      "Atualizado em: " + (upd ? upd.toLocaleString("pt-BR") : "—");
    if (!data.news || !data.news.length) {
      list.innerHTML = '<div class="empty">Nenhuma notícia ainda. A busca automática preenche este espaço.</div>';
      return;
    }
    list.innerHTML = "";
    data.news.forEach((n, i) => {
      const d = n.pubDate ? new Date(n.pubDate) : null;
      const dateStr = d && !isNaN(d) ? d.toLocaleDateString("pt-BR") : "";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="info">
          <h3><a href="${n.link}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a></h3>
          <div class="src"><span class="tag">${escapeHtml(n.source || "Fonte")}</span>${dateStr}</div>
        </div>`;
      const btn = document.createElement("button");
      btn.className = "btn";
      btn.textContent = "Gerar post";
      btn.onclick = () => openModal(n);
      card.appendChild(btn);
      list.appendChild(card);
    });
  } catch (e) {
    list.innerHTML = '<div class="empty">Erro ao carregar news.json. Rode o site via GitHub Pages ou servidor local.</div>';
  }
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------- Gerador de post (canvas 1080x1080) ---------- */
const overlay = document.getElementById("overlay");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function openModal(n) {
  document.getElementById("headlineInput").value = n.title || "";
  document.getElementById("footerInput").value = (n.source ? "Fonte: " + n.source : "") + "  ·  " + CONFIG.handle;
  overlay.classList.add("open");
  render();
}
function closeModal() { overlay.classList.remove("open"); }
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

function wrapText(context, text, maxWidth) {
  const words = text.split(/\s+/);
  const lines = [];
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (context.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function render() {
  const W = 1080, H = 1080;
  const headline = document.getElementById("headlineInput").value.trim();
  const kicker = document.getElementById("kickerInput").value.trim();
  const footer = document.getElementById("footerInput").value.trim();
  const pad = 90;

  // Fundo
  ctx.fillStyle = CONFIG.brand;
  ctx.fillRect(0, 0, W, H);

  // Faixa decorativa inferior
  ctx.fillStyle = CONFIG.accent;
  ctx.fillRect(0, H - 150, W, 12);

  // Barra de destaque superior (kicker)
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = CONFIG.accent;
  ctx.font = "700 34px Arial";
  const kickerText = (kicker || "").toUpperCase();
  const kw = ctx.measureText(kickerText).width;
  ctx.fillRect(pad, 150, kw + 44, 64);
  ctx.fillStyle = "#1c1500";
  ctx.fillText(kickerText, pad + 22, 192);

  // Nome da imobiliária (topo direito)
  ctx.fillStyle = "rgba(255,255,255,.85)";
  ctx.font = "700 30px Arial";
  ctx.textAlign = "right";
  ctx.fillText(CONFIG.agencyName, W - pad, 192);
  ctx.textAlign = "left";

  // Manchete — ajusta o tamanho da fonte para caber
  const maxW = W - pad * 2;
  let fontSize = 86;
  let lines = [];
  do {
    ctx.font = `800 ${fontSize}px Arial`;
    lines = wrapText(ctx, headline, maxW);
    if (lines.length * fontSize * 1.18 <= 600) break;
    fontSize -= 4;
  } while (fontSize > 40);

  ctx.fillStyle = "#ffffff";
  ctx.font = `800 ${fontSize}px Arial`;
  const lineH = fontSize * 1.18;
  const blockH = lines.length * lineH;
  let y = 340 + Math.max(0, (560 - blockH) / 2) + fontSize;
  for (const ln of lines) {
    ctx.fillText(ln, pad, y);
    y += lineH;
  }

  // Rodapé
  ctx.fillStyle = "rgba(255,255,255,.78)";
  ctx.font = "400 28px Arial";
  ctx.fillText(footer, pad, H - 70);

  // Logo opcional (canto inferior direito)
  if (logoImg && logoImg.complete && logoImg.naturalWidth) {
    const lh = 70;
    const lw = (logoImg.naturalWidth / logoImg.naturalHeight) * lh;
    ctx.drawImage(logoImg, W - pad - lw, H - 70 - lh + 10, lw, lh);
  }
}

function downloadPng() {
  render();
  const link = document.createElement("a");
  link.download = "post-imobiliaria-" + Date.now() + ".png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

loadNews();
</script>
</body>
</html>
